# RTKLIB Web PPK — Default Static PPK Profile
# Optimized for u-blox ZED-F9P static observations
# Based on RTKLIBExplorer demo5 recommended settings

pos1-posmode       =static        # (0:single,1:dgps,2:kinematic,3:static,4:movingbase,5:fixed)
pos1-frequency     =l1+l2         # (1:l1,2:l1+l2,3:l1+l2+l5)
pos1-soltype       =forward       # (0:forward,1:backward,2:combined)
pos1-elmask        =15            # elevation mask (deg)
pos1-snrmask_r     =0             # SNR mask rover
pos1-snrmask_b     =0             # SNR mask base
pos1-dynamics      =off           # (0:off,1:on)
pos1-tidecorr      =off           # (0:off,1:on)
pos1-ionoopt       =brdc          # (0:off,1:brdc,2:sbas,3:dual-freq,4:est-stec)
pos1-tropopt       =saas          # (0:off,1:saas,2:sbas,3:est-ztd)
pos1-sateph        =brdc          # (0:brdc,1:precise,2:brdc+sbas,3:brdc+ssrapc)
pos1-posopt1       =off           # satellite PCV
pos1-posopt2       =off           # receiver PCV
pos1-posopt5       =off           # RAIM FDE

pos2-armode        =fix-and-hold  # (0:off,1:continuous,2:instantaneous,3:fix-and-hold)
pos2-gloarmode     =on            # GLONASS AR (0:off,1:on,2:autocal)
pos2-bdsarmode     =on            # BeiDou AR
pos2-arthres       =3.0           # AR validation threshold
pos2-arlockcnt     =0             # AR lock count
pos2-arelmask      =0             # AR elevation mask
pos2-arminfix      =10            # min fix to hold
pos2-elmaskhold    =0             # hold elevation mask
pos2-aroutcnt      =5             # AR out count to reset
pos2-maxage        =30            # max age of diff (s)
pos2-slipthres     =0.05          # cycle slip threshold (m)
pos2-rejionno      =30            # reject threshold of innovation (m)
pos2-rejgdop       =30            # reject threshold of GDOP
pos2-niter         =1             # number of iterations
pos2-baselen       =0             # constraint baseline length (m)
pos2-basesig       =0             # constraint baseline sigma (m)

out-solformat      =llh           # (0:llh,1:xyz,2:enu,3:nmea)
out-outhead        =on            # output header
out-outopt         =on            # output options
out-timesys        =gpst          # (0:gpst,1:utc,2:jst)
out-timeform       =hms           # (0:tow,1:hms)
out-timendec       =3             # time decimal places
out-degform        =deg           # (0:deg,1:dms)
out-fieldsep       =              # field separator
out-height         =ellipsoidal   # (0:ellipsoidal,1:geodetic)
out-geoid          =internal      # (0:internal,1:egm96,2:egm08_2.5,3:egm08_1)
out-solstatic      =all           # (0:all,1:single)
out-nmeaintv1      =0             # NMEA GGA interval (s)
out-nmeaintv2      =0             # NMEA GSA interval (s)
out-outstat        =residual      # (0:off,1:state,2:residual)

stats-eratio1      =300           # code/phase error ratio L1
stats-eratio2      =300           # code/phase error ratio L2
stats-errphase     =0.003         # phase error (m)
stats-errphasel    =0.003         # phase error (m/10km)
stats-errphasebl   =0             # phase error baseline (m)
stats-errdoppler   =10            # doppler error (Hz)

ant1-postype       =llh           # rover antenna position type
ant1-anttype       =              # rover antenna type
ant2-postype       =llh           # base antenna position type
ant2-anttype       =              # base antenna type

misc-timeinterp    =on            # time interpolation
misc-sbasatsel     =0             # SBAS satellite selection
misc-rnxopt1       =              # RINEX option 1
misc-rnxopt2       =              # RINEX option 2
